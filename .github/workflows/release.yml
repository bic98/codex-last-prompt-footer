name: release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset_suffix: linux-x86_64
            archive_ext: tar.gz
            binary_name: codex
          - os: macos-13
            asset_suffix: macos-x86_64
            archive_ext: tar.gz
            binary_name: codex
          - os: macos-14
            asset_suffix: macos-aarch64
            archive_ext: tar.gz
            binary_name: codex
          - os: windows-latest
            asset_suffix: windows-x86_64
            archive_ext: zip
            binary_name: codex.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libcap-dev pkg-config build-essential

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install openssl@3 pkg-config

      - name: Build patched Codex on POSIX
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/release
          SKIP_PREBUILT_DOWNLOAD=1 OUTPUT_DIR="$PWD/dist/release" bash ./scripts/build.sh

      - name: Build patched Codex on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\release | Out-Null
          ./scripts/build.ps1 -SkipPrebuiltDownload -OutputDir "$PWD\dist\release"

      - name: Package POSIX archive
        if: runner.os != 'Windows'
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="codex-last-prompt-footer-${version}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}"
          tar -C dist/release -czf "$asset" "${{ matrix.binary_name }}"
          echo "ASSET_NAME=$asset" >> "$GITHUB_ENV"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $asset = "codex-last-prompt-footer-$version-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "dist\release\${{ matrix.binary_name }}" -DestinationPath $asset -Force
          "ASSET_NAME=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_NAME }}
